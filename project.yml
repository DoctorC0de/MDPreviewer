name: MDPreviewer
options:
  bundleIdPrefix: com.mdpreviewer
packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.1.0
  Splash:
    url: https://github.com/JohnSundell/Splash
    from: 0.16.0
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.13.0
targets:
  MDPreviewerCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources: [MDPreviewerCore]
    entitlements:
      path: MDPreviewerCore/MDPreviewerCore.entitlements
    dependencies:
      - package: MarkdownUI
      - package: Splash
  MDPreviewer:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources: [MDPreviewer]
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: MDPreviewer
    entitlements:
      path: MDPreviewer/MDPreviewer.entitlements
      properties:
        com.apple.security.application-groups: [group.com.mdpreviewer]
    dependencies:
      - target: MDPreviewerCore
      - target: MDPreviewerExtension
  MDPreviewerExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources: [MDPreviewerExtension]
    entitlements:
      path: MDPreviewerExtension/MDPreviewerExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups: [group.com.mdpreviewer]
    dependencies:
      - target: MDPreviewerCore
    info:
      path: MDPreviewerExtension/MDPreviewerExtension-Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).PreviewProvider"
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - public.markdown
              - net.daringfireball.markdown
  MDPreviewerTests:
    type: bundle.unit-test
    platform: macOS
    sources: [MDPreviewerTests]
    entitlements:
      path: MDPreviewerTests/MDPreviewerTests.entitlements
    dependencies:
      - target: MDPreviewerCore
      - package: SnapshotTesting
