name: Build MDPreviewer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Test
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: |
        xcodegen generate

    - name: List Targets and Schemes
      run: |
        xcodebuild -list -project MDPreviewer.xcodeproj

    - name: Build MDPreviewer
      run: |
        xcodebuild build -project MDPreviewer.xcodeproj -scheme MDPreviewer -destination 'platform=macOS'
