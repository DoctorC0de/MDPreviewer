name: Build MDPreviewer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: macos-15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Resolve Package Dependencies
      run: xcodebuild -resolvePackageDependencies -project MDPreviewer.xcodeproj -scheme MDPreviewer

    - name: Build MDPreviewer
      run: |
        xcodebuild build -project MDPreviewer.xcodeproj -scheme MDPreviewer \
          -configuration Release \
          -destination 'platform=macOS' \
          -derivedDataPath ./build \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGN_ENTITLEMENTS=""

    - name: Upload MDPreviewer.app
      uses: actions/upload-artifact@v4
      with:
        name: MDPreviewer
        path: ./build/Build/Products/Release/MDPreviewer.app
