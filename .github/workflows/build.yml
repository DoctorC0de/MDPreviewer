name: Build MDPreviewer (Rust)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: macos-15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build Rust Core
      run: cargo build --release

    - name: Build Swift Bridge
      run: |
        mkdir -p build
        swiftc -emit-library -static -o build/libqlbridge.a \
          -sdk $(xcrun --show-sdk-path --sdk macosx) \
          swift-bridge/QLBridge.swift

    - name: Bundle App
      run: ./scripts/bundle.sh

    - name: Upload MDPreviewer.app
      uses: actions/upload-artifact@v4
      with:
        name: MDPreviewer
        path: build/MDPreviewer.app
